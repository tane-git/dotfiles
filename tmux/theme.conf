# Appearance / theme

# Subtly dim inactive panes (bg only affects cells using default background)
set -g window-style 'fg=colour245,bg=colour235'  # inactive: muted
set -g window-active-style 'bg=terminal'  # active: real terminal background

# Border cells keep their own bg — match them to the dim colour
set -g pane-border-style 'fg=colour240,bg=colour235'
set -g pane-active-border-style 'fg=colour114,bg=terminal'
