# ============================================================
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# Windows
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Panes
bind -n M-H split-window -hb -c "#{pane_current_path}"   # new pane left
bind -n M-J split-window -v  -c "#{pane_current_path}"   # new pane below
bind -n M-K split-window -vb -c "#{pane_current_path}"   # new pane above
bind -n M-L split-window -h  -c "#{pane_current_path}"   # new pane right
bind -n M-h select-pane -L -Z
bind -n M-j select-pane -D -Z
bind -n M-k select-pane -U -Z
bind -n M-l select-pane -R -Z
bind -n C-M-h resize-pane -L 2
bind -n C-M-j resize-pane -D 2
bind -n C-M-k resize-pane -U 2
bind -n C-M-l resize-pane -R 2
bind -n M-z resize-pane -Z
# centered y/n menu — confirm-before can only use the status line
bind -n M-x display-menu -T "#[align=centre]kill pane #P?" \
    -x "#{e|-:#{e|+:#{pane_left},#{e|/:#{pane_width},2}},8}" \
    -y "#{e|+:#{pane_top},#{e|/:#{pane_height},2}}" \
    "yes" y { kill-pane } \
    "no"  n {}

# Misc
set -s escape-time 10    # default 500ms makes Esc feel laggy
bind -n M-u copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -n M-d detach-client

# Windows/panes number from 1 (default: 0)
set -g base-index 1
setw -g pane-base-index 1
