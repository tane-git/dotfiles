set-option -g default-shell /usr/bin/zsh
set -g mouse on
set -s escape-time 0
set -g focus-events on
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:Tc"
set -as terminal-features ",alacritty:extkeys"
set -s extended-keys always
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key -n C-Space copy-mode

# Copy mode scrolling
bind-key -T copy-mode-vi C-j send-keys -X halfpage-down
bind-key -T copy-mode-vi C-k send-keys -X halfpage-up

# Window switching with Alt+numbers
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Window navigation
bind-key -n M-Left previous-window
bind-key -n M-Right if-shell -F '#{==:#{window_index},#{session_windows}}' 'new-window -a -c "#{pane_current_path}"' 'next-window'
bind-key -n M-o last-window
bind-key -n M-t new-window -c "#{pane_current_path}"
bind-key -n M-r command-prompt -I "#W" "rename-window '%%'"
bind-key -n M-x kill-pane
bind-key -n M-Down swap-window -t -1 \; select-window -t -1
bind-key -n M-Up swap-window -t +1 \; select-window -t +1

# Config management
bind-key -n M-c switch-client -T config-mode
bind-key -T config-mode r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind-key -T config-mode v new-window "v ~/.tmux.conf"

# Pane selection
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Pane resize
bind-key -n M-H resize-pane -L 5
bind-key -n M-J resize-pane -D 5
bind-key -n M-K resize-pane -U 5
bind-key -n M-L resize-pane -R 5

# Pane zoom
bind-key -n M-z resize-pane -Z

# Pane break
bind-key -n M-b break-pane

# Pane marking
bind-key -n M-m select-pane -m

# Pane paste (join the marked pane onto this one)
bind-key -n M-v switch-client -T PASTE
bind-key -T PASTE h join-pane -h -b -s '{marked}' \; switch-client -T root
bind-key -T PASTE l join-pane -h    -s '{marked}' \; switch-client -T root
bind-key -T PASTE k join-pane -v -b -s '{marked}' \; switch-client -T root
bind-key -T PASTE j join-pane -v    -s '{marked}' \; switch-client -T root
bind-key -T PASTE Escape switch-client -T root

# Pane mode
bind-key -n M-p switch-client -T PANES
bind-key -T PANES h split-window -h -b -c "#{pane_current_path}" \; switch-client -T root
bind-key -T PANES l split-window -h    -c "#{pane_current_path}" \; switch-client -T root
bind-key -T PANES k split-window -v -b -c "#{pane_current_path}" \; switch-client -T root
bind-key -T PANES j split-window -v    -c "#{pane_current_path}" \; switch-client -T root
bind-key -T PANES e select-layout -E \; switch-client -T root
bind-key -T PANES o rotate-window \; switch-client -T root
bind-key -T PANES c select-layout even-horizontal \; switch-client -T root
bind-key -T PANES r select-layout even-vertical \; switch-client -T root
bind-key -T PANES Escape switch-client -T root

# Session management
# -f hides dashboard clone sessions (tagged @agent-dashboard-clone, must
# match $CLONE_OPTION in agent-lib.sh) from the picker. -F is tmux 3.6a's
# own default tree-line format (from window-tree.c) with the
# "#{?session_grouped, (group ...),}" clause removed, so real sessions
# don't show group noise while a dashboard clone is grouped with them.
bind-key -n M-s choose-tree -s -f "#{==:#{@agent-dashboard-clone},}" -F '#{?pane_format,#{?pane_marked,#[reverse],}#{pane_current_command}#{?pane_active,*,}#{?pane_marked,M,}#{?#{&&:#{pane_title},#{!=:#{pane_title},#{host_short}}},: "#{pane_title}",},#{?window_format,#{?window_marked_flag,#[reverse],}#{window_name}#{window_flags}#{?#{&&:#{==:#{window_panes},1},#{&&:#{pane_title},#{!=:#{pane_title},#{host_short}}}},: "#{pane_title}",},#{session_windows} windows#{?session_attached, (attached),}}}'
bind-key -n M-C new-session
bind-key -n M-R command-prompt -p "rename session:" "rename-session '%%'"

# Agent dashboard
bind-key -n M-d run-shell "~/.tmux/agent-dashboard.sh '#{client_tty}'"
bind-key -n M-g run-shell "~/.tmux/agent-goto-session.sh '#{client_tty}'"

# Tear down the dashboard the instant anyone leaves it, however they leave
# (M-g, M-s, anything) — see agent-dashboard-hook.sh for why.
set-hook -g client-session-changed 'run-shell "~/.tmux/agent-dashboard-hook.sh \"#{hook_client}\" \"#{session_name}\""'

# Toggle windows <-> panes
bind-key -n M-a run-shell "~/.tmux/toggle-panes.sh"

# Smart toggle between windows and panes
bind-key -n M-A run-shell " \
    if [ $(tmux list-windows | wc -l) -gt 1 ]; then \
        while tmux join-pane -s :+ 2>/dev/null; do :; done && tmux select-layout tiled; \
    elif [ $(tmux list-panes | wc -l) -gt 1 ]; then \
        while [ $(tmux list-panes | wc -l) -gt 1 ]; do tmux break-pane -d -a; done; \
    fi \
"

# Styling
set-option -g status-position top

# --- Status Bar General ---
set -g status-position top
set -g status-style bg=green,fg=black

# --- Inactive Tab Styling ---
setw -g window-status-style bg=green,fg=black
setw -g window-status-format " #I:#W "

# --- Active Tab Styling ---
# We use 'colour0' specifically to force deep black
# and 'brightmagenta' for the neon background.
setw -g window-status-current-style bg=brightmagenta,fg=colour0,bold
setw -g window-status-current-format "#[fg=colour0,bg=brightmagenta,bold] #I:#W "

# --- Cleanup ---
# Removes the gaps between the green bar and the magenta tab
# so it looks like a clean, solid block.
setw -g window-status-separator ""

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

